<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my watchlist ✦</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700;800&display=swap');

    :root {
      --cream: #fffaf7;
      --pink: #f4b8c8;
      --pink-deep: #e991aa;
      --lavender: #c9b8f4;
      --lavender-deep: #a78ee8;
      --blue: #b8d8f4;
      --peach: #f4cdb8;
      --mint: #b8f4d8;
      --white-glass: rgba(255, 255, 255, 0.75);
      --shadow-pink: 0 8px 32px rgba(244, 184, 200, 0.35);
      --shadow-lavender: 0 8px 32px rgba(201, 184, 244, 0.35);
      --radius: 24px;
      --radius-sm: 14px;
      --radius-full: 999px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--cream);
      font-family: 'Quicksand', sans-serif;
      color: #5c4e5b;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Page background gradients & dot overlay */
    .bg-blobs {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: radial-gradient(ellipse at 15% 10%, rgba(244, 184, 200, 0.45) 0%, transparent 55%),
                  radial-gradient(ellipse at 85% 8%, rgba(201, 184, 244, 0.40) 0%, transparent 55%),
                  radial-gradient(ellipse at 50% 95%, rgba(244, 205, 184, 0.35) 0%, transparent 50%);
    }

    .bg-dots {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.12;
      background-image: radial-gradient(circle, #e991aa 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* Floating Sticker Layer */
    #sticker-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    #sticker-layer img {
      position: absolute;
      opacity: 0.65;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Animations */
    @keyframes float-up {
      0%, 100% { transform: translateY(0px) rotate(var(--rotate-deg, 0deg)); }
      50% { transform: translateY(-20px) rotate(var(--rotate-deg, 0deg)); }
    }

    @keyframes sway {
      0%, 100% { transform: rotate(calc(var(--rotate-deg, 0deg) - 10deg)); }
      50% { transform: rotate(calc(var(--rotate-deg, 0deg) + 10deg)); }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse-scale {
      0%, 100% { transform: scale(1) rotate(var(--rotate-deg, 0deg)); }
      50% { transform: scale(1.15) rotate(var(--rotate-deg, 0deg)); }
    }

    @keyframes bounce-in {
      0% { transform: scale(0.6); opacity: 0; }
      70% { transform: scale(1.08); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes shimmer-text {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    @keyframes slide-up {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(255, 250, 247, 0.82);
      border-bottom: 1.5px solid rgba(244, 184, 200, 0.4);
      padding: 18px 24px;
      text-align: center;
    }

    .title-area {
      position: relative;
      display: inline-block;
      padding: 0 60px;
    }

    .title-area h1 {
      font-family: 'Comic Sans MS', 'Pacifico', cursive;
      font-size: clamp(2rem, 5vw, 3.2rem);
      margin: 0;
      background: linear-gradient(90deg, #e991aa, #a78ee8, #7ec8e3, #e991aa);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer-text 4s linear infinite;
    }

    .title-sticker {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: auto;
      pointer-events: none;
    }

    .title-sticker.left {
      left: 0;
      --rotate-deg: -10deg;
      animation: float-up 6s ease-in-out infinite;
    }

    .title-sticker.right {
      right: 0;
      --rotate-deg: 15deg;
      animation: float-up 5s ease-in-out infinite;
    }

    .subtitle {
      font-family: 'Quicksand', sans-serif;
      font-style: italic;
      font-weight: 500;
      font-size: 0.95rem;
      color: #c084a0;
      margin-top: 4px;
    }

    /* Sticker divider row */
    .sticker-divider {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .divider-sticker {
      width: 28px;
      height: 28px;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      transition: transform 0.2s;
    }

    .divider-sticker:hover {
      transform: scale(1.3) rotate(15deg);
    }

    /* App container */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px 100px;
      z-index: 10;
      position: relative;
    }

    /* Main Navigation Tabs */
    .main-nav {
      display: flex;
      gap: 12px;
      justify-content: center;
      padding: 24px 16px 0;
    }

    .main-tab {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1.05rem;
      padding: 12px 32px;
      border-radius: var(--radius-full);
      border: none;
      cursor: pointer;
      position: relative;
      background: rgba(244, 184, 200, 0.2);
      color: #c084a0;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .main-tab:hover {
      background: rgba(244, 184, 200, 0.35);
      color: #a05a7e;
      transform: translateY(-2px);
    }

    .main-tab.active {
      background: linear-gradient(135deg, var(--pink), var(--lavender));
      color: white;
      box-shadow: var(--shadow-pink);
      animation: bounce-in 0.35s ease;
    }

    .active-badge-indicator {
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 18px;
    }

    /* Group panel wrappers */
    .tab-content {
      display: none;
      animation: slide-up 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .tab-content.active {
      display: block;
    }

    /* Status sub-tabs & indicators */
    .status-nav {
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 20px 16px 0;
      flex-wrap: wrap;
    }

    .status-chip {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      padding: 8px 20px;
      border-radius: var(--radius-full);
      border: 1.5px solid rgba(244, 184, 100, 0);
      cursor: pointer;
      position: relative;
      background: rgba(255, 255, 255, 0.7);
      color: #9a7aa0;
      border: 1.5px solid rgba(244, 184, 200, 0.4);
      transition: all 0.25s;
    }

    .status-chip:hover {
      background: rgba(255, 255, 255, 0.9);
      color: #72507a;
    }

    .status-chip.active {
      background: linear-gradient(135deg, var(--lavender), var(--blue));
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(201, 184, 244, 0.45);
    }

    /* Count badge */
    .badge-count {
      position: absolute;
      top: -7px;
      right: -7px;
      background: var(--pink-deep);
      color: white;
      font-size: 0.7rem;
      font-weight: 800;
      min-width: 20px;
      height: 20px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      border: 1.5px solid white;
      box-shadow: 0 2px 6px rgba(233, 145, 170, 0.4);
    }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 16px 16px 0;
      flex-wrap: wrap;
    }

    .stat-pill {
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      padding: 6px 16px;
      border-radius: var(--radius-full);
      color: #645566;
    }

    .stat-pill.watching {
      background-color: rgba(244, 205, 184, 0.35);
      border: 1px solid rgba(244, 205, 184, 0.7);
    }

    .stat-pill.watched {
      background-color: rgba(184, 244, 216, 0.35);
      border: 1px solid rgba(184, 244, 216, 0.7);
    }

    .stat-pill.towatch {
      background-color: rgba(184, 216, 244, 0.35);
      border: 1px solid rgba(184, 216, 244, 0.7);
    }

    .status-num-anim {
      display: inline-block;
      animation: slide-up 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* Search & Filter bar */
    .filter-bar {
      display: flex;
      gap: 12px;
      padding: 20px 16px 12px;
      flex-wrap: wrap;
      align-items: center;
      max-width: 900px;
      margin: 0 auto;
    }

    .search-wrapper {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-input {
      width: 100%;
      padding: 10px 16px 10px 42px;
      border-radius: var(--radius-full);
      border: 1.5px solid rgba(244, 184, 200, 0.5);
      background: rgba(255, 255, 255, 0.85);
      font-family: 'Quicksand', sans-serif;
      font-weight: 500;
      color: #5c4e5b;
      outline: none;
      transition: all 0.25s ease-in-out;
    }

    .search-input:focus {
      border-color: var(--lavender-deep);
      box-shadow: 0 0 0 3px rgba(201, 184, 244, 0.25);
      background: white;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      color: #b59cb7;
    }

    .select-dropdown {
      padding: 10px 18px;
      border-radius: var(--radius-full);
      border: 1.5px solid rgba(244, 184, 200, 0.4);
      background: white;
      font-family: 'Quicksand', sans-serif;
      font-weight: 500;
      font-size: 0.88rem;
      color: #645566;
      cursor: pointer;
      outline: none;
      transition: all 0.2s;
    }

    .select-dropdown:hover {
      border-color: var(--pink);
    }

    .select-dropdown:focus {
      border-color: var(--pink-deep);
      box-shadow: 0 0 0 3px rgba(244, 184, 200, 0.2);
    }

    /* Cards Grid */
    .cards-grid {
      display: grid;
      gap: 20px;
      padding: 16px;
    }

    /* Default mobile column sizes */
    @media(max-width:599px) {
      .cards-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 8px;
      }
    }
    @media(min-width:600px) {
      .cards-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media(min-width:900px) {
      .cards-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media(min-width:1200px) {
      .cards-grid { grid-template-columns: repeat(5, 1fr); }
    }

    /* Hide odd floating stickers on small devices */
    @media(max-width:480px) {
      #sticker-layer img:nth-child(odd) {
        display: none !important;
      }
    }

    /* Individual watchlist card style */
    .watchlist-card {
      background: rgba(255, 255, 255, 0.84);
      border-radius: var(--radius);
      border: 1.5px solid rgba(244, 184, 200, 0.25);
      box-shadow: 0 4px 20px rgba(244, 184, 200, 0.15);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      overflow: visible;
      position: relative;
      display: flex;
      flex-direction: column;
      transition: transform 0.28s cubic-bezier(0.175, 0.885, 0.32, 1.255),
                  box-shadow 0.28s ease;
      cursor: pointer;
    }

    .watchlist-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 40px rgba(244, 184, 200, 0.38);
    }

    /* Shake mode for deletion */
    .watchlist-card.shake {
      animation: shake 0.4s ease-in-out infinite;
    }

    .card-cover {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      border-radius: var(--radius) var(--radius) 0 0;
      background: #f1f1f1;
    }

    .card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }

    .watchlist-card:hover .card-cover img {
      transform: scale(1.04);
    }

    /* Placeholder styles */
    .card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Pacifico', cursive;
      color: white;
      user-select: none;
    }

    .card-placeholder-letter {
      font-size: clamp(3rem, 8vw, 4.2rem);
      text-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    /* Top-right overlay status badge */
    .card-status-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 3px 9px;
      border-radius: var(--radius-full);
      font-size: 0.68rem;
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .card-status-badge.watching {
      background: rgba(244, 205, 184, 0.9);
      color: #924715;
    }

    .card-status-badge.watched {
      background: rgba(184, 244, 216, 0.9);
      color: #105934;
    }

    .card-status-badge.towatch {
      background: rgba(184, 216, 244, 0.9);
      color: #124c80;
    }

    /* Category badge bottom-left */
    .card-category-badge {
      position: absolute;
      bottom: 8px;
      left: 8px;
      padding: 3px 9px;
      border-radius: var(--radius-full);
      font-size: 0.68rem;
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.88);
      color: #7a5a8a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* Hover sticker top-right outside cover */
    .card-hover-sticker {
      position: absolute;
      top: -14px;
      right: -10px;
      width: 36px;
      height: 36px;
      object-fit: contain;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.22s, transform 0.22s;
      transform: scale(0.6) rotate(10deg);
      pointer-events: none;
    }

    .watchlist-card:hover .card-hover-sticker {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    /* Action buttons slider */
    .card-actions {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(233, 145, 170, 0.95), rgba(233, 145, 170, 0.4) 65%, transparent);
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: flex-end;
      padding: 20px 10px 10px;
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 10;
    }

    .watchlist-card:hover .card-actions {
      transform: translateY(0);
    }

    .card-btn {
      border: none;
      padding: 5px 12px;
      border-radius: var(--radius-full);
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 0.72rem;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.15s, background-color 0.15s;
    }

    .card-btn:hover {
      transform: scale(1.06);
    }

    .card-btn.edit {
      background: white;
      color: var(--pink-deep);
    }

    .card-btn.delete {
      background: white;
      color: #e05a7a;
    }

    /* Card info section */
    .card-info {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      flex: 1;
      justify-content: space-between;
    }

    .card-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: #534554;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 6px;
      height: 2.7em; /* Prevents visual layout shifts */
    }

    .card-footer-info {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }

    .card-date {
      font-size: 0.7rem;
      color: #bfaabf;
      font-family: 'Quicksand', sans-serif;
    }

    .card-stars {
      display: flex;
      gap: 1px;
      color: var(--pink-deep);
      font-size: 0.8rem;
    }

    /* Deletion tooltip on card */
    .delete-tooltip {
      position: absolute;
      inset: 0;
      background: rgba(255, 252, 250, 0.96);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 15;
      text-align: center;
      animation: bounce-in 0.25s ease;
      border: 2px dashed var(--pink);
    }

    .delete-tooltip p {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      color: #e05a7a;
      margin-bottom: 12px;
    }

    .delete-tooltip-btns {
      display: flex;
      gap: 10px;
    }

    .tooltip-btn {
      border: none;
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tooltip-btn.yes {
      background: #e05a7a;
      color: white;
      box-shadow: 0 4px 12px rgba(224, 90, 122, 0.3);
    }

    .tooltip-btn.yes:hover {
      background: #c9405f;
    }

    .tooltip-btn.keep {
      background: rgba(244, 184, 200, 0.25);
      color: #a05a7e;
    }

    .tooltip-btn.keep:hover {
      background: rgba(244, 184, 200, 0.4);
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 20px;
      grid-column: 1 / -1;
      width: 100%;
      animation: slide-up 0.35s ease;
    }

    .empty-sticker {
      width: 90px;
      height: 90px;
      object-fit: contain;
      margin-bottom: 18px;
    }

    .empty-state-fallback {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--peach), var(--pink));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(244, 184, 200, 0.4);
    }

    .empty-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
      color: #9c6c84;
      margin-bottom: 6px;
    }

    .empty-sub {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.9rem;
      color: #b59cb7;
      margin-bottom: 18px;
    }

    .empty-add-btn {
      border: none;
      background: linear-gradient(135deg, var(--pink-deep), #f1a9b5);
      color: white;
      padding: 10px 22px;
      border-radius: var(--radius-full);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      box-shadow: var(--shadow-pink);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .empty-add-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 28px rgba(244, 184, 200, 0.5);
    }

    /* Floating Add Button */
    .floating-add-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 200;
      border: none;
      padding: 14px 28px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--pink-deep), var(--lavender-deep));
      color: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1.05rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 28px rgba(233, 145, 170, 0.5);
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
      --rotate-deg: 0deg;
      animation: pulse-scale 2.5s ease-in-out infinite;
    }

    .floating-add-btn:hover {
      transform: scale(1.06);
      filter: brightness(1.04);
      box-shadow: 0 12px 36px rgba(233, 145, 170, 0.65);
    }

    .floating-add-sticker {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }

    /* Modal Backdrop Overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(244, 184, 200, 0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Modal Double Border Box */
    .modal-container-border {
      background: linear-gradient(135deg, var(--pink), var(--lavender-deep));
      border-radius: var(--radius);
      padding: 2.5px;
      width: min(92vw, 540px);
      max-height: 90vh;
      display: flex;
      box-shadow: 0 24px 64px rgba(233, 145, 170, 0.35);
      animation: bounce-in 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-box {
      background: rgba(255, 252, 250, 0.98);
      border-radius: calc(var(--radius) - 2px);
      width: 100%;
      padding: 26px;
      overflow-y: auto;
      max-height: calc(90vh - 5px);
      position: relative;
    }

    /* Custom Scrollbar for Modal Box */
    .modal-box::-webkit-scrollbar {
      width: 6px;
    }
    .modal-box::-webkit-scrollbar-track {
      background: transparent;
    }
    .modal-box::-webkit-scrollbar-thumb {
      background: var(--pink);
      border-radius: 4px;
    }

    .modal-stickers-decor {
      position: absolute;
      top: 14px;
      pointer-events: none;
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    .modal-stickers-decor.left {
      left: 14px;
      animation: float-up 4s ease-in-out infinite;
    }

    .modal-stickers-decor.right {
      right: 50vw; /* Offset so it stays cool */
      animation: float-up 4.5s ease-in-out infinite;
    }

    .modal-close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: rgba(244, 184, 200, 0.25);
      border: none;
      color: #9a7aa0;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s, transform 0.15s;
    }

    .modal-close-btn:hover {
      background: rgba(244, 184, 200, 0.4);
      transform: scale(1.05);
    }

    .modal-title-custom {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1.35rem;
      margin-bottom: 22px;
      text-align: center;
      padding-top: 4px;
      background: linear-gradient(90deg, var(--pink-deep), var(--lavender-deep));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
    }

    .form-label {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      color: #9a7aa0;
      margin-bottom: 6px;
      text-transform: lowercase;
    }

    /* Cover Picker container */
    .cover-picker-area {
      width: 140px;
      aspect-ratio: 2/3;
      border-radius: var(--radius-sm);
      margin: 0 auto 12px;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, var(--pink), var(--lavender));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      gap: 6px;
      box-shadow: 0 4px 12px rgba(244, 184, 200, 0.25);
      transition: filter 0.2s, transform 0.2s;
    }

    .cover-picker-area:hover {
      filter: brightness(1.03);
      transform: scale(1.01);
    }

    .cover-picker-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cover-picker-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: white;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .cover-picker-area:hover .cover-picker-overlay {
      opacity: 1;
    }

    .picker-icon-default {
      font-size: 2rem;
    }

    .picker-text-default {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .url-toggle-btn {
      background: none;
      border: none;
      color: #b59cb7;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.76rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      margin: 0 auto 12px;
      display: block;
    }

    .url-toggle-btn:hover {
      color: var(--pink-deep);
    }

    .form-text-input {
      width: 100%;
      padding: 10px 16px;
      border-radius: var(--radius-full);
      border: 1.5px solid rgba(244, 184, 200, 0.5);
      background: rgba(255, 255, 255, 0.85);
      font-family: 'Quicksand', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      color: #5c4e5b;
      outline: none;
      transition: all 0.2s;
    }

    .form-text-input:focus {
      border-color: var(--pink-deep);
      box-shadow: 0 0 0 3px rgba(244, 184, 200, 0.2);
      background: white;
    }

    .form-text-input.textarea {
      border-radius: 18px;
      resize: none;
    }

    .form-select {
      width: 100%;
      padding: 10px 16px;
      border-radius: var(--radius-full);
      border: 1.5px solid rgba(244, 184, 200, 0.5);
      background: white;
      font-family: 'Quicksand', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      color: #645566;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-select:focus {
      border-color: var(--pink-deep);
    }

    /* Form Status Toggle Options */
    .form-status-selector {
      display: flex;
      gap: 10px;
    }

    .status-toggle-btn {
      flex: 1;
      border: 1.5px solid rgba(244, 184, 200, 0.4);
      background: white;
      color: #9a7aa0;
      padding: 8px 12px;
      border-radius: var(--radius-full);
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.22s;
    }

    .status-toggle-btn:hover {
      background: rgba(244, 184, 200, 0.1);
      color: #72507a;
    }

    .status-toggle-btn.selected {
      background: linear-gradient(135deg, var(--pink), var(--lavender));
      color: white;
      border-color: transparent;
      box-shadow: var(--shadow-pink);
    }

    /* Rating Star Spans */
    .rating-container {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 4px 0;
    }

    .star-elem {
      font-size: 1.8rem;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s, color 0.15s;
    }

    .star-elem:hover {
      transform: scale(1.2);
    }

    .star-elem.filled {
      color: var(--pink-deep);
    }

    .star-elem.empty {
      color: #e2d1e2;
    }

    /* Form actions buttons */
    .form-submit-btn {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--pink-deep), var(--lavender-deep));
      color: white;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: var(--shadow-pink);
      transition: transform 0.2s, filter 0.2s;
    }

    .form-submit-btn:hover {
      transform: translateY(-1.5px);
      filter: brightness(1.05);
    }

    .form-cancel-btn {
      width: 100%;
      border: none;
      background: transparent;
      color: #9a7aa0;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      padding: 8px 0;
      margin-top: 6px;
      transition: color 0.2s;
    }

    .form-cancel-btn:hover {
      color: var(--pink-deep);
    }

    /* Detail View Modal Design */
    .detail-cover-container {
      width: 100%;
      max-height: 280px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: #fdfafb;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(244, 184, 200, 0.2);
    }

    .detail-cover-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      max-height: 280px;
    }

    .detail-placeholder {
      width: 100%;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .detail-title {
      font-family: 'Pacifico', cursive;
      font-size: 1.8rem;
      text-align: center;
      margin-bottom: 14px;
      background: linear-gradient(90deg, #e991aa, #a78ee8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.4;
    }

    .detail-badges-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .detail-badge {
      padding: 4px 14px;
      border-radius: var(--radius-full);
      font-size: 0.78rem;
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .detail-badge.status {
      background-color: var(--peach);
      color: #a04f20;
    }

    .detail-badge.category {
      background-color: rgba(201, 184, 244, 0.35);
      color: var(--lavender-deep);
    }

    .detail-stars {
      display: flex;
      gap: 3px;
      justify-content: center;
      font-size: 1.3rem;
      color: var(--pink-deep);
      margin-bottom: 16px;
    }

    .detail-thoughts-box {
      background: rgba(244, 184, 200, 0.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1.5px dashed rgba(244, 184, 200, 0.4);
    }

    .detail-thoughts-label {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.8rem;
      color: #9a7aa0;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-thoughts-text {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.9rem;
      line-height: 1.45;
      color: #5c4e5b;
      white-space: pre-wrap;
    }

    .detail-date-label {
      font-size: 0.75rem;
      color: #bca4b7;
      text-align: center;
      margin-bottom: 24px;
      font-family: 'Quicksand', sans-serif;
    }

    .detail-actions {
      display: flex;
      gap: 12px;
    }

    .detail-btn {
      flex: 1;
      padding: 11px;
      border-radius: var(--radius-full);
      border: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .detail-btn.edit {
      background: linear-gradient(135deg, var(--pink), var(--lavender));
      color: white;
      box-shadow: var(--shadow-pink);
    }

    .detail-btn.edit:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
    }

    .detail-btn.close {
      background: #f1ebd9;
      color: #8c7882;
    }

    .detail-btn.close:hover {
      background: #e7dfca;
    }

    /* Progress Summary inside each Card */
    .card-progress-summary {
      margin-top: 4px;
      margin-bottom: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .card-progress-summary .progress-lbl {
      font-size: 10px;
      font-weight: 600;
      color: #a78ee8;
      text-transform: lowercase;
    }

    .card-progress-summary .progress-track-mini {
      height: 4px;
      width: 100%;
      background-color: rgba(244, 184, 200, 0.15);
      border-radius: 999px;
      overflow: hidden;
    }

    .card-progress-summary .progress-bar-mini {
      height: 100%;
      background: linear-gradient(90deg, #f4b8c8, #c9b8f4);
      border-radius: 999px;
      transition: width 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* Detail Modal Episodes Tracker style */
    .detail-episodes-box {
      margin-top: 15px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.65);
      border: 1px dashed rgba(244, 184, 200, 0.4);
    }

    .detail-episodes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
      gap: 6px;
      margin-top: 10px;
      margin-bottom: 10px;
      max-height: 160px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .detail-episodes-grid::-webkit-scrollbar {
      width: 4px;
    }
    .detail-episodes-grid::-webkit-scrollbar-track {
      background: transparent;
    }
    .detail-episodes-grid::-webkit-scrollbar-thumb {
      background: rgba(244, 184, 200, 0.5);
      border-radius: 999px;
    }

    .ep-bubble-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px dashed rgba(201, 184, 244, 0.6);
      background: white;
      color: #9a7aa0;
      font-size: 11px;
      font-weight: 700;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      padding: 0;
      user-select: none;
    }

    .ep-bubble-btn:hover {
      transform: scale(1.1) rotate(5deg);
      border-color: #a78ee8;
    }

    .ep-bubble-btn.checked {
      background: linear-gradient(135deg, rgba(244, 184, 200, 0.3) 0%, rgba(201, 184, 244, 0.3) 100%);
      border: 1.5px solid #f4b8c8;
      box-shadow: 0 2px 6px rgba(244, 184, 200, 0.3);
      color: #e991aa;
    }

    .ep-bubble-btn .ep-check-icon {
      position: absolute;
      font-size: 10px;
      top: -4px;
      right: -4px;
      transform: rotate(15deg);
    }

    .ep-progress-bar-container {
      height: 6px;
      width: 100%;
      background: rgba(201, 184, 244, 0.15);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 6px;
    }

    .ep-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #e991aa, #a78ee8);
      border-radius: 999px;
      width: 0%;
      transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
  </style>
</head>
<body>
  <!-- Blurred gradient bg blobs and repeating dots -->
  <div class="bg-blobs"></div>
  <div class="bg-dots"></div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
